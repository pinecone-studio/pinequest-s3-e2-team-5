name: CD

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "web/**"
      - ".github/workflows/cd.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: read

env:
  NODE_VERSION: 20.19.0
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done

      - name: Install web dependencies
        run: npm ci

      - name: Build preview worker
        run: npx opennextjs-cloudflare build --env preview

      - name: Deploy preview worker
        run: npx opennextjs-cloudflare deploy --env preview -- --keep-vars

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-production
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done

      - name: Install web dependencies
        run: npm ci

      - name: Deploy production worker
        run: npm run deploy
