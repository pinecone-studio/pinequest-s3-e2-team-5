name: CD

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "web/**"
      - "cold-king-fc65/**"
      - ".github/workflows/cd.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "cold-king-fc65/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: read

env:
  NODE_VERSION: 20.19.0
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  validate-cloudflare-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done

  validate-web:
    runs-on: ubuntu-latest
    needs: validate-cloudflare-secrets
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint

      - name: Build web worker
        run: npx opennextjs-cloudflare build

  validate-api:
    runs-on: ubuntu-latest
    needs: validate-cloudflare-secrets
    defaults:
      run:
        working-directory: cold-king-fc65
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cold-king-fc65/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Run API tests
        run: npm test -- --run

      - name: Dry-run API deploy
        run: npx wrangler deploy --dry-run

  deploy-web-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - validate-web
      - validate-api
    concurrency:
      group: cloudflare-web-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build preview web worker
        run: npx opennextjs-cloudflare build --env preview

      - name: Deploy preview web worker
        run: npx opennextjs-cloudflare deploy --env preview -- --keep-vars

  deploy-api-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - validate-web
      - validate-api
    concurrency:
      group: cloudflare-api-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: cold-king-fc65
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cold-king-fc65/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Deploy preview API worker
        run: npx wrangler deploy --name cold-king-fc65-preview

  deploy-web-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - validate-web
      - validate-api
    concurrency:
      group: cloudflare-web-production
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Deploy production web worker
        run: npm run deploy

  deploy-api-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - validate-web
      - validate-api
    concurrency:
      group: cloudflare-api-production
      cancel-in-progress: true
    defaults:
      run:
        working-directory: cold-king-fc65
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cold-king-fc65/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Deploy production API worker
        run: npm run deploy
